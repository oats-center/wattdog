# Example wattdog config.
# Production files may contain secret action URLs; install as mode 0600.

[data]
dir = "/var/lib/wattdog"
roll = "hourly"

[metrics]
listen = "127.0.0.1:9107"

[http]
method = "POST"
timeout = "5s"
retry_initial = "1s"
retry_max = "5s"
require_https = false
allow_invalid_certs = false

[[states]]
name = "battery_relay"
serial = "12345678"
field = "voltage1_volts"
default_state = "off"
stale_after = "30s"

[states.on]
op = "<="
value = 12.0
duration = "30s"
url = "http://127.0.0.1:8080/relay/on"

[states.off]
op = ">="
value = 12.6
duration = "5m"
url = "http://127.0.0.1:8080/relay/off"
